<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

input {
    padding: 12px;
    width: 200px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>Login</h1>

<input id="name" placeholder="Enter your name" onkeypress="handleEnter(event)"><br>

<button onclick="login()">Login</button>

</div>

<script>
function login() {
    let name = document.getElementById("name").value.trim();

    if(name === "") {
        alert("Please enter your name ❗");
        return;
    }

    localStorage.setItem("user", name);

    window.location.href = "index.html";
}

// Enter press se login
function handleEnter(e) {
    if(e.key === "Enter") {
        login();
    }
}
</script>

</body>
</html>
