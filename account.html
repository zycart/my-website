<!DOCTYPE html>
<html>
<head>
    <title>Account - ZyCart</title>
</head>

<body style="font-family:Arial; text-align:center; padding:50px;">

<h1>👤 My Account</h1>

<!-- Login Button -->
<button onclick="googleLogin()" style="
padding:15px;
background:#4285F4;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
">
Login with Google
</button>

<div id="userInfo" style="margin-top:20px;"></div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA-fViJVH8-1CJZz5DTTMIED_LDJIz1S7c",
  authDomain: "zycart-363f8.firebaseapp.com",
  projectId: "zycart-363f8",
  storageBucket: "zycart-363f8.firebasestorage.app",
  messagingSenderId: "783503867017",
  appId: "1:783503867017:web:90d59bbb0c4272d30b1a58",
  measurementId: "G-ZT9ZNRB7PY"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Google Login
function googleLogin() {
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
    .then((result) => {
        const user = result.user;

        localStorage.setItem("user", user.displayName);
        localStorage.setItem("email", user.email);

        alert("Welcome " + user.displayName);

        window.location.href = "index.html";
    })
    .catch((error) => {
        alert("Login Failed ❌");
        console.log(error);
    });
}

// Show user
function showUser() {
    let user = localStorage.getItem("user");

    if(user){
        document.getElementById("userInfo").innerHTML = `
            <h2>Welcome ${user} 👋</h2>
            <button onclick="logout()">Logout</button>
        `;
    }
}

// Logout
function logout() {
    localStorage.removeItem("user");
    localStorage.removeItem("email");
    location.reload();
}

// Run on load
showUser();

</script>

</body>
</html>
