<!DOCTYPE html>
<html>
<head>
<title>Account</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 50px;
    background: #f5f5f5;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    max-width: 300px;
    margin: auto;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 25px;
    font-weight: bold;
    cursor: pointer;
}

.logout {
    background: red;
    color: white;
}

.home {
    background: #ccc;
}
</style>
</head>

<body>

<div class="box">

<h2>👤 My Account</h2>

<p id="user-email"></p>

<button class="logout" onclick="logout()">🚪 Logout</button>
<button class="home" onclick="goHome()">🏠 Home</button>

</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));
let isLoggedIn = localStorage.getItem("isLoggedIn");

if(!user || isLoggedIn !== "true"){
    window.location.href = "login.html";
} else {
    document.getElementById("user-email").innerText = user.email;
}

function logout() {
    localStorage.removeItem("isLoggedIn");
    window.location.href = "login.html";
}

function goHome() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
