<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
    padding: 30px;
}
.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    max-width: 350px;
    margin: auto;
}
input {
    width: 90%;
    padding: 10px;
    margin: 5px 0;
}
button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border-radius: 25px;
    background: #667eea;
    color: white;
    border: none;
}
#upi-box { display:none; }
</style>
</head>

<body>

<div class="box">

<h2 id="product"></h2>
<h3 id="price"></h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<input id="city" placeholder="City">
<input id="pincode" placeholder="Pincode">

<button onclick="getLocation()">📍 Use My Location</button>
<button onclick="placeOrder()">Place Order</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const productName = params.get("name");
const productPrice = params.get("price");

document.getElementById("product").innerText = productName;
document.getElementById("price").innerText = "₹" + productPrice;

let userLocation = "";

// 📍 LOCATION
function getLocation() {
    if(navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            userLocation = `https://www.google.com/maps?q=${lat},${lon}`;
            document.getElementById("address").value = userLocation;

            alert("Location added ✅");
        });
    }
}

// 🛒 ORDER
function placeOrder() {

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;
    let city = document.getElementById("city").value;
    let pincode = document.getElementById("pincode").value;

    if(!name || !phone || !address || !city || !pincode){
        alert("Fill all fields ❌");
        return;
    }

    // 👉 address ko map link me convert
    let mapLink = userLocation 
        ? userLocation 
        : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address + " " + city + " " + pincode)}`;

    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    orders.push({
        product: productName,
        price: productPrice,
        name: name,
        phone: phone,
        address: address + ", " + city + " - " + pincode,
        location: mapLink,
        status: "Pending"
    });

    localStorage.setItem("orders", JSON.stringify(orders));

    alert("Order Placed ✅");

    window.location.href = "success.html";
}

</script>

</body>
</html>
