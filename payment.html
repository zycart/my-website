<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
    padding: 30px;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    max-width: 350px;
    margin: auto;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.option {
    text-align: left;
    margin: 10px 0;
}

input {
    width: 90%;
    padding: 10px;
    margin: 5px 0;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
}

#upi-box {
    display: none;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="box">

<h1>💳 Payment</h1>

<h3 id="product"></h3>
<h2 id="price"></h2>

<div class="option">
    <input type="radio" name="pay" value="cod" checked> Cash on Delivery (COD)
</div>

<div class="option">
    <input type="radio" name="pay" value="upi"> Pay via UPI / PhonePe / Paytm
</div>

<div id="upi-box">
    <h3>📱 Scan & Pay</h3>
    <img id="qr" width="200">
    <p>UPI ID: 9555538841@ptyes</p>
</div>

<h3>📍 Delivery Address</h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Mobile Number">
<input id="address" placeholder="Full Address">
<input id="city" placeholder="City">
<input id="pincode" placeholder="Pincode">

<button type="button" onclick="getLocation()">📍 Use My Location</button>
<button type="button" onclick="placeOrder()">Place Order</button>

</div>

<script>

// PRODUCT DATA
const params = new URLSearchParams(window.location.search);
const productName = params.get("name");
const productPrice = params.get("price");

document.getElementById("product").innerText = productName;
document.getElementById("price").innerText = "₹" + productPrice;

// AUTO FILL ADDRESS
window.onload = function() {
    const saved = JSON.parse(localStorage.getItem("userAddress"));
    if(saved){
        document.getElementById("name").value = saved.name;
        document.getElementById("phone").value = saved.phone;
        document.getElementById("address").value = saved.address;
        document.getElementById("city").value = saved.city;
        document.getElementById("pincode").value = saved.pincode;
    }
};

// UPI TOGGLE
let upiRadio = document.querySelector('input[value="upi"]');
let codRadio = document.querySelector('input[value="cod"]');
let upiBox = document.getElementById("upi-box");

upiRadio.addEventListener("change", showQR);
codRadio.addEventListener("change", hideQR);

function showQR() {
    upiBox.style.display = "block";

    let upiID = "9555538841@ptyes";
    let name = "ZyCart";
    let amount = productPrice || 0;

    let upiLink = `upi://pay?pa=${upiID}&pn=${name}&am=${amount}&cu=INR`;
    let qrURL = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiLink)}`;

    document.getElementById("qr").src = qrURL;
}

function hideQR() {
    upiBox.style.display = "none";
}

// LOCATION
let userLocation = "";

function getLocation() {
    if(navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(showPosition, showError);
    } else {
        alert("Geolocation not supported ❌");
    }
}

function showPosition(position) {
    let lat = position.coords.latitude;
    let lon = position.coords.longitude;

    userLocation = `https://www.google.com/maps?q=${lat},${lon}`;

    document.getElementById("address").value = userLocation;

    alert("Location fetched ✅");
}

function showError(error) {
    if(error.code === 1){
        alert("❌ Permission denied (Allow karo)");
    }
    else if(error.code === 2){
        alert("❌ Location unavailable");
    }
    else{
        alert("❌ Unknown error");
    }
}

// MAIN ORDER
function placeOrder() {

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;
    const city = document.getElementById("city").value;
    const pincode = document.getElementById("pincode").value;

    const paymentMethod = document.querySelector('input[name="pay"]:checked').value;

    if(!name || !phone || !address || !city || !pincode){
        alert("Please fill all details ❌");
        return;
    }

    // SAVE ADDRESS
    localStorage.setItem("userAddress", JSON.stringify({
        name, phone, address, city, pincode
    }));

    // SAVE ORDER
    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    orders.push({
        product: productName,
        price: productPrice,
        payment: paymentMethod,
        address: `${address}, ${city} - ${pincode}`,
        status: "Pending"
    });

    localStorage.setItem("orders", JSON.stringify(orders));

    // WHATSAPP
    let paymentText = paymentMethod === "upi" ? "UPI Payment" : "Cash on Delivery";

    let message = `🛒 *New Order - ZyCart*%0A%0A
📦 Product: ${productName}%0A
💰 Price: ₹${productPrice}%0A%0A
👤 Name: ${name}%0A
📞 Phone: ${phone}%0A
🏠 Address: ${address}, ${city}, ${pincode}%0A
📍 Location: ${userLocation || "Not provided"}%0A
🚚 Payment: ${paymentText}`;

    let whatsappNumber = "919555538841";

    let url = `https://wa.me/${whatsappNumber}?text=${message}`;

    window.open(url, "_blank");

    alert("Order Placed ✅");

    window.location.href = "success.html";
}

</script>

</body>
</html>
