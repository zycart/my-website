<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
    padding: 30px;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    max-width: 350px;
    margin: auto;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.option {
    text-align: left;
    margin: 10px 0;
}

input {
    width: 90%;
    padding: 10px;
    margin: 5px 0;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>💳 Payment</h1>

<h3 id="product"></h3>
<h2 id="price"></h2>

<div class="option">
    <input type="radio" name="pay" value="cod" checked> Cash on Delivery (COD)
</div>

<div class="option">
    <input type="radio" name="pay" value="upi"> Pay via UPI / PhonePe / Paytm
</div>

<p id="upi-text" style="display:none;">
    👉 Aap kisi bhi UPI app se payment kar sakte ho
</p>

<h3>📍 Delivery Address</h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Mobile Number">
<input id="address" placeholder="Full Address">
<input id="city" placeholder="City">
<input id="pincode" placeholder="Pincode">

<button onclick="placeOrder()">Place Order</button>

</div>

<script>
window.onload = function() {

    // URL se data lena
    const params = new URLSearchParams(window.location.search);

    const productName = params.get("name");
    const productPrice = params.get("price");

    // screen pe show karna
    document.getElementById("product").innerText = productName;
    document.getElementById("price").innerText = "₹" + productPrice;

    // button function
    window.placeOrder = function() {

        if(!productName || !productPrice){
            alert("Product data missing ❌");
            return;
        }

        let orders = JSON.parse(localStorage.getItem("orders")) || [];

        orders.push({
            name: productName,
            price: productPrice,
            status: "Pending"
        });

        localStorage.setItem("orders", JSON.stringify(orders));

        alert("✅ Order Placed Successfully!");

        window.location.href = "success.html";
    }

};
</script>

</body>
</html>
