<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
    padding: 30px;
}
.box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    max-width: 350px;
    margin: auto;
}
input {
    width: 90%;
    padding: 10px;
    margin: 5px 0;
}
button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border-radius: 25px;
    background: #667eea;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="box">

<h2 id="product"></h2>
<h3 id="price"></h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<input id="city" placeholder="City">
<input id="pincode" placeholder="Pincode">

<button onclick="getLocation()">📍 Use My Location</button>
<button onclick="placeOrder()">Place Order</button>

</div>

<script>

// 👉 PRODUCT DATA
const params = new URLSearchParams(window.location.search);
const productName = params.get("name") || "Unknown Product";
const productPrice = Number(params.get("price")) || 0;

document.getElementById("product").innerText = productName;
document.getElementById("price").innerText = "₹" + productPrice;

let userLocation = "";

// 📍 LOCATION
function getLocation() {
    if(navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            userLocation = `https://www.google.com/maps?q=${lat},${lon}`;
            document.getElementById("address").value = userLocation;

            alert("Location added ✅");
        });
    } else {
        alert("Location not supported ❌");
    }
}

// 🛒 ORDER + WHATSAPP
function placeOrder() {

    console.log("Button clicked");

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;
    let city = document.getElementById("city").value;
    let pincode = document.getElementById("pincode").value;

    if(!name || !phone || !address || !city || !pincode){
        alert("Fill all fields ❌");
        return;
    }

    // 📍 Map link
    let mapLink = userLocation 
        ? userLocation 
        : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address + " " + city + " " + pincode)}`;

    // 💾 Save Order
    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    orders.push({
    product: productName,
    price: productPrice,
    name,
    phone,
    address: address + ", " + city + " - " + pincode,
    location: mapLink,
    status: "Pending"
});

    localStorage.setItem("orders", JSON.stringify(orders));

    // 🟢 WhatsApp Message
    let message = `🛒 New Order - ZyCart

📦 Product: ${productName}
💰 Price: ₹${productPrice}

👤 Name: ${name}
📞 Phone: ${phone}
🏠 Address: ${address}, ${city} - ${pincode}

📍 Location: ${mapLink}

🚚 Payment: Cash on Delivery`;

    // ⚠️ IMPORTANT: apna number daal
    let whatsappNumber = "919555538841"; 

    let url = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message);

    console.log(url);

    // 🚀 WhatsApp open
    window.open(url, "_blank");

    // 👉 Success page bhi open ho
    setTimeout(() => {
        window.location.href = "success.html";
    }, 2000);
}

</script>

</body>
</html>
