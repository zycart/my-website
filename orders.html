<!DOCTYPE html>
<html>
<body style="font-family: Arial; padding:20px;">

<h1>📦 Your Orders</h1>

<div id="orders"></div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];

function loadOrders() {
    let html = "";

    orders.forEach((order, index) => {
        html += `
        <div style="background:white; padding:15px; margin:15px 0; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1);">
            
            <h3>${order.product}</h3>
            <p>💰 Price: ₹${order.price}</p>
            <p>💳 Payment: ${order.payment.toUpperCase()}</p>
            <p>📍 Address: ${order.address}</p>
            <p>Status: <b>${order.status}</b></p>

            <br>

            ⭐ Rate this product:
            <select onchange="rateProduct(${index}, this.value)">
                <option value="">Select</option>
                <option value="1">⭐ 1</option>
                <option value="2">⭐⭐ 2</option>
                <option value="3">⭐⭐⭐ 3</option>
                <option value="4">⭐⭐⭐⭐ 4</option>
                <option value="5">⭐⭐⭐⭐⭐ 5</option>
            </select>

            <p>Rating: ${order.rating || "Not rated"}</p>

            <button onclick="updateStatus(${index})">Update Status</button>

        </div>
        `;
    });

    document.getElementById("orders").innerHTML = html;
}

function rateProduct(index, rating) {
    orders[index].rating = rating;
    localStorage.setItem("orders", JSON.stringify(orders));
    loadOrders();
}

function updateStatus(index) {
    if(orders[index].status === "Pending") {
        orders[index].status = "Shipped";
    } else if(orders[index].status === "Shipped") {
        orders[index].status = "Delivered";
    }

    localStorage.setItem("orders", JSON.stringify(orders));
    loadOrders();
}

loadOrders();

// auto status update (हर 5 sec)
setInterval(updateStatus, 5000);
</script>

</body>
</html>
