<!DOCTYPE html>
<html>
<body style="font-family: Arial; padding:20px; background:#f5f5f5;">

<h1>รฐลธโยฆ Your Orders</h1>

<div id="orders"></div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];

function loadOrders() {
    let html = "";

    orders.forEach((order, index) => {
        html += `
        <div style="background:white; padding:15px; margin:15px 0; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1);">
            
            <h3>${order.product || order.name}</h3>
            <p>รฐลธโยฐ Price: รขโยน${order.price}</p>
            <p>รฐลธโยณ Payment: ${order.payment || "COD"}</p>
            <p>รฐลธโย Address: ${order.address || "Not provided"}</p>
            <p>Status: <b>${order.status}</b></p>

            <br>

            รขยญย Rate this product:
            <select onchange="rateProduct(${index}, this.value)">
                <option value="">Select</option>
                <option value="1">รขยญย 1</option>
                <option value="2">รขยญยรขยญย 2</option>
                <option value="3">รขยญยรขยญยรขยญย 3</option>
                <option value="4">รขยญยรขยญยรขยญยรขยญย 4</option>
                <option value="5">รขยญยรขยญยรขยญยรขยญยรขยญย 5</option>
            </select>

            <p>Rating: ${order.rating || "Not rated"}</p>

        </div>
        `;
    });

    document.getElementById("orders").innerHTML = html;
}

function rateProduct(index, rating) {
    orders[index].rating = rating;
    localStorage.setItem("orders", JSON.stringify(orders));
    loadOrders();
}

loadOrders();
</script>

</body>
</html>
