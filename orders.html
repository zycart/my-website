<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Your Orders</title>
</head>

<body style="font-family: Arial; padding:20px; background:#f5f5f5;">

<h1>📦 Your Orders</h1>

<div id="orders"></div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];

orders = orders.reverse();

function loadOrders() {
    let html = "";

    orders.forEach((order, index) => {
        html += `
        <div style="background:white; padding:15px; margin:15px 0; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1);">
            
            <h3>${order.product || order.name}</h3>
            <p>💰 Price: ₹${order.price}</p>
            <p>💳 Payment: ${order.payment || "COD"}</p>
            <p>📍 Address: ${order.address || "Not provided"}</p>
            <p>Status: <b>${order.status || "Pending"}</b></p>

            <br>

            ⭐ Rate this product:
            <select onchange="rateProduct(${index}, this.value)">
                <option value="">Select</option>
                <option value="1">⭐ 1</option>
                <option value="2">⭐⭐ 2</option>
                <option value="3">⭐⭐⭐ 3</option>
                <option value="4">⭐⭐⭐⭐ 4</option>
                <option value="5">⭐⭐⭐⭐⭐ 5</option>
            </select>

            <p>Rating: ${order.rating || "Not rated"}</p>

        </div>
        `;
    });

    document.getElementById("orders").innerHTML = html;
}

function rateProduct(index, rating) {
    let originalIndex = orders.length - 1 - index;

    let originalOrders = JSON.parse(localStorage.getItem("orders")) || [];
    originalOrders[originalIndex].rating = rating;

    localStorage.setItem("orders", JSON.stringify(originalOrders));

    loadOrders();
}

loadOrders();
</script>

</body>
</html>
