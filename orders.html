<!DOCTYPE html>
<html>
<head>
<title>Orders</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 20px;
}

h1 {
    text-align: center;
}

.order-box {
    background: white;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.status {
    font-weight: bold;
}

.pending { color: orange; }
.shipped { color: blue; }
.delivered { color: green; }

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 20px;
    background: #667eea;
    color: white;
    cursor: pointer;
}
</style>

</head>

<body>

<h1>📦 Your Orders</h1>

<div id="orders"></div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];

let html = "";

if(orders.length === 0){
    html = "<h3>No orders yet 😢</h3>";
} else {
    orders.forEach((order) => {
        html += `
        <div style="background:#f5f5f5; padding:15px; margin:10px; border-radius:10px;">
            <h3>${order.name}</h3>
            <p>₹${order.price}</p>
            <p>Status: ${order.status}</p>
        </div>
        `;
    });
}

document.getElementById("orders").innerHTML = html;
</script>
        <div class="order-box">
            <h3>${order.product}</h3>
            <p>💰 Price: ₹${order.price}</p>
            <p>💳 Payment: ${order.payment.toUpperCase()}</p>
            <p>📍 Address: ${order.address}</p>
            <p class="status ${statusClass}">Status: ${order.status}</p>
<p>⭐ Rate this product:</p>

<select onchange="rateProduct(${index}, this.value)">
    <option value="">Select</option>
    <option value="1" ${order.rating==1?"selected":""}>⭐ 1</option>
    <option value="2" ${order.rating==2?"selected":""}>⭐⭐ 2</option>
    <option value="3" ${order.rating==3?"selected":""}>⭐⭐⭐ 3</option>
    <option value="4" ${order.rating==4?"selected":""}>⭐⭐⭐⭐ 4</option>
    <option value="5" ${order.rating==5?"selected":""}>⭐⭐⭐⭐⭐ 5</option>
</select>

<p>Rating: ${order.rating || "Not rated"}</p>
            <button onclick="nextStatus(${index})">Update Status</button>
        </div>
      
</script>

</body>
</html>
